<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="n8nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
    <filter id="n8nGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#n8nGrad)" opacity="0.08"/>

  <!-- Workflow nodes -->
  <!-- Left node -->
  <circle cx="20" cy="50" r="6" fill="#FF6B35" opacity="0.9" filter="url(#n8nGlow)"/>
  <circle cx="20" cy="50" r="4" fill="white" opacity="0.3"/>

  <!-- Center node -->
  <circle cx="50" cy="50" r="6" fill="url(#n8nGrad)" opacity="0.95" filter="url(#n8nGlow)"/>
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.4"/>

  <!-- Right node -->
  <circle cx="80" cy="50" r="6" fill="#F7931E" opacity="0.9" filter="url(#n8nGlow)"/>
  <circle cx="80" cy="50" r="4" fill="white" opacity="0.3"/>

  <!-- Connecting lines with arrow heads -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF6B35" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Line from left to center -->
  <path d="M 26 50 Q 38 45 44 50" stroke="#FF6B35" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)" opacity="0.8"/>

  <!-- Line from center to right -->
  <path d="M 56 50 Q 68 45 74 50" stroke="#F7931E" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)" opacity="0.8"/>

  <!-- Top automation indicator -->
  <path d="M 30 30 Q 35 25 40 30" stroke="#FF6B35" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 60 30 Q 65 25 70 30" stroke="#F7931E" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Bottom automation indicator -->
  <path d="M 30 70 Q 35 75 40 70" stroke="#FF6B35" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 60 70 Q 65 75 70 70" stroke="#F7931E" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Central gear/automation symbol -->
  <g opacity="0.3">
    <circle cx="50" cy="50" r="15" fill="none" stroke="url(#n8nGrad)" stroke-width="0.5"/>
    <circle cx="50" cy="50" r="20" fill="none" stroke="url(#n8nGrad)" stroke-width="0.5" opacity="0.5"/>
  </g>
</svg>