<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="finGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="finGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <filter id="finGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#finGrad)" opacity="0.07"/>

  <!-- Income/Expense bars (left side) -->
  <!-- Income bar (green) -->
  <rect x="12" y="38" width="10" height="28" rx="2" fill="url(#finGreen)" opacity="0.85" filter="url(#finGlow)"/>
  <!-- Expense bar (red-ish) -->
  <rect x="25" y="48" width="10" height="18" rx="2" fill="#F87171" opacity="0.8" filter="url(#finGlow)"/>

  <!-- Arrow down (expense label) -->
  <path d="M 30 44 L 30 47" stroke="#F87171" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <polygon points="27,46 30,49 33,46" fill="#F87171" opacity="0.7"/>

  <!-- Arrow up (income label) -->
  <path d="M 17 36 L 17 33" stroke="#34D399" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <polygon points="14,34 17,31 20,34" fill="#34D399" opacity="0.7"/>

  <!-- Divider -->
  <line x1="42" y1="20" x2="42" y2="80" stroke="#22D3EE" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Right side: allocation panel -->
  <!-- "Saldo" label area -->
  <rect x="46" y="20" width="42" height="14" rx="3" fill="url(#finGrad)" opacity="0.15" stroke="#22D3EE" stroke-width="0.5"/>
  <rect x="50" y="24" width="16" height="2" rx="1" fill="#22D3EE" opacity="0.5"/>
  <rect x="68" y="23" width="12" height="4" rx="1" fill="#34D399" opacity="0.7"/>

  <!-- Allocation slices (pie-like segments) -->
  <!-- Pie chart -->
  <circle cx="65" cy="57" r="18" fill="none" stroke="#1E293B" stroke-width="0" opacity="0"/>
  <!-- Slice 1 - 40% -->
  <path d="M 65 57 L 65 39 A 18 18 0 0 1 82 67 Z" fill="#22D3EE" opacity="0.7" filter="url(#finGlow)"/>
  <!-- Slice 2 - 35% -->
  <path d="M 65 57 L 82 67 A 18 18 0 0 1 50 72 Z" fill="#34D399" opacity="0.7" filter="url(#finGlow)"/>
  <!-- Slice 3 - 25% -->
  <path d="M 65 57 L 50 72 A 18 18 0 0 1 65 39 Z" fill="#A78BFA" opacity="0.7" filter="url(#finGlow)"/>
  <!-- Center hole -->
  <circle cx="65" cy="57" r="8" fill="#0F172A" opacity="0.85"/>
  <rect x="61" y="55" width="8" height="2" rx="1" fill="#22D3EE" opacity="0.6"/>
  <rect x="62" y="58" width="6" height="1.5" rx="0.75" fill="#34D399" opacity="0.5"/>
</svg>
