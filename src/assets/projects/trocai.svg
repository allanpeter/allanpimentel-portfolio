<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trocaiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trocaiAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6EE7B7;stop-opacity:1" />
    </linearGradient>
    <filter id="trocaiGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#trocaiGrad)" opacity="0.07"/>

  <!-- Left item box -->
  <rect x="10" y="36" width="28" height="28" rx="6" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="1"/>
  <rect x="16" y="42" width="6" height="6" rx="1" fill="#34D399" opacity="0.8"/>
  <rect x="24" y="42" width="10" height="2" rx="1" fill="#6EE7B7" opacity="0.7"/>
  <rect x="24" y="46" width="7" height="2" rx="1" fill="#6EE7B7" opacity="0.5"/>
  <rect x="16" y="52" width="18" height="2" rx="1" fill="#34D399" opacity="0.4"/>
  <rect x="16" y="56" width="14" height="2" rx="1" fill="#34D399" opacity="0.3"/>

  <!-- Right item box -->
  <rect x="62" y="36" width="28" height="28" rx="6" fill="#059669" opacity="0.2" stroke="#059669" stroke-width="1"/>
  <rect x="68" y="42" width="6" height="6" rx="1" fill="#6EE7B7" opacity="0.8"/>
  <rect x="76" y="42" width="10" height="2" rx="1" fill="#34D399" opacity="0.7"/>
  <rect x="76" y="46" width="7" height="2" rx="1" fill="#34D399" opacity="0.5"/>
  <rect x="68" y="52" width="18" height="2" rx="1" fill="#6EE7B7" opacity="0.4"/>
  <rect x="68" y="56" width="14" height="2" rx="1" fill="#6EE7B7" opacity="0.3"/>

  <!-- Exchange arrows (center) -->
  <!-- Arrow left to right -->
  <path d="M 42 46 L 56 46" stroke="url(#trocaiGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#trocaiGlow)"/>
  <polygon points="54,43 59,46 54,49" fill="#10B981" opacity="0.9"/>

  <!-- Arrow right to left -->
  <path d="M 58 54 L 44 54" stroke="url(#trocaiAccent)" stroke-width="2.5" stroke-linecap="round" filter="url(#trocaiGlow)"/>
  <polygon points="46,51 41,54 46,57" fill="#34D399" opacity="0.9"/>

  <!-- Users/people indicators at bottom -->
  <circle cx="24" cy="76" r="5" fill="#10B981" opacity="0.5"/>
  <path d="M 19 83 Q 24 80 29 83" stroke="#10B981" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <circle cx="76" cy="76" r="5" fill="#059669" opacity="0.5"/>
  <path d="M 71 83 Q 76 80 81 83" stroke="#059669" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
