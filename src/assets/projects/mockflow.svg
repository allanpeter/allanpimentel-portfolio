<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <defs>
    <linearGradient id="mockflowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#mockflowGrad)" opacity="0.08"/>

  <!-- Left figure (Junior) -->
  <circle cx="30" cy="25" r="5" fill="#00D9FF" opacity="0.9"/>
  <path d="M 25 32 Q 30 35 35 32" stroke="#00D9FF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <rect x="25" y="37" width="10" height="12" rx="2" fill="#00D9FF" opacity="0.8"/>

  <!-- Right figure (Senior) -->
  <circle cx="70" cy="25" r="5" fill="#7C3AED" opacity="0.9"/>
  <path d="M 65 32 Q 70 35 75 32" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <rect x="65" y="37" width="10" height="12" rx="2" fill="#7C3AED" opacity="0.8"/>

  <!-- Connection line with glow effect -->
  <g filter="url(#glow)">
    <path d="M 35 41 Q 50 48 65 41" stroke="url(#mockflowGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Growth arrows / Learning indicator -->
  <path d="M 32 55 L 32 65 L 28 61" stroke="#00D9FF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <path d="M 50 55 L 50 65 L 46 61" stroke="url(#mockflowGrad)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 68 55 L 68 65 L 64 61" stroke="#7C3AED" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Conversation bubbles at bottom -->
  <rect x="20" y="72" width="18" height="12" rx="4" fill="#00D9FF" opacity="0.5"/>
  <polygon points="38,78 35,75 35,81" fill="#00D9FF" opacity="0.5"/>

  <rect x="62" y="72" width="18" height="12" rx="4" fill="#7C3AED" opacity="0.5"/>
  <polygon points="62,78 65,75 65,81" fill="#7C3AED" opacity="0.5"/>
</svg>